apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth
  namespace: casego-apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - auth.158-160-192-124.nip.io
      secretName: auth-tls
  rules:
    - host: auth.158-160-192-124.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8000
