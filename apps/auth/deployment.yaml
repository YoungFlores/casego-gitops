apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: casego-apps
  labels:
    app: auth
spec:
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/sewaustav/casego-auth:main-1781351505-bed3ed1aeb27d9d4a5f5da524b63d597d8b603e3 # {"$imagepolicy": "flux-system:casego-auth"}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: POSTGRES_HOST
              value: postgres-auth
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: auth_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_AUTH_PASSWORD
            - name: POSTGRES_DB
              value: auth_db
            - name: REDIS_HOST
              value: redis-casego
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: REDIS_PASSWORD
            - name: CORS_ORIGINS
              value: "*"
            - name: JWT_ALG
              value: RS256
          envFrom:
            - secretRef:
                name: auth-oauth
      containers:
        - name: auth
          image: ghcr.io/sewaustav/casego-auth:main-1781351505-bed3ed1aeb27d9d4a5f5da524b63d597d8b603e3 # {"$imagepolicy": "flux-system:casego-auth"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DEBUG
              value: "False"
            - name: ENVIRONMENT
              value: production
            - name: API_PORT
              value: "8000"
            - name: API_PORT_FORWARD
              value: "8000"
            - name: JWT_ALG
              value: RS256
            - name: ACCESS_TOKEN_EXPIRE_SECONDS
              value: "3600"
            - name: REFRESH_TOKEN_EXPIRE_SECONDS
              value: "604800"
            - name: CORS_ORIGINS
              value: "*"
            - name: POSTGRES_HOST
              value: postgres-auth
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: auth_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_AUTH_PASSWORD
            - name: POSTGRES_DB
              value: auth_db
            - name: REDIS_HOST
              value: redis-casego
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: REDIS_PASSWORD
            - name: REDIS_TTL
              value: "3600"
          envFrom:
            - secretRef:
                name: auth-oauth
          volumeMounts:
            - name: jwt-keys
              mountPath: /app/keys
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: jwt-keys
          secret:
            secretName: auth-jwt-keys
