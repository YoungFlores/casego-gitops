apiVersion: apps/v1
kind: Deployment
metadata:
  name: caseprofile
  namespace: casego-apps
  labels:
    app: caseprofile
spec:
  selector:
    matchLabels:
      app: caseprofile
  template:
    metadata:
      labels:
        app: caseprofile
    spec:
      containers:
        - name: caseprofile
          image: ghcr.io/sewaustav/casego-caseprofile:main-fcab8d2e2584d9ae9a9a568206571e330ef6d48b # {"$imagepolicy": "flux-system:casego-caseprofile"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8082
            - name: grpc
              containerPort: 50051
          env:
            - name: POSTGRES_HOST
              value: postgres-caseprofile
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: caseprofile_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_CASEPROFILE_PASSWORD
            - name: POSTGRES_DB
              value: caseprofile_db
            - name: PUBLIC_KEY
              valueFrom:
                configMapKeyRef:
                  name: jwt-public-key
                  key: PUBLIC_KEY
            # Auth и CaseGo сейчас подписывают одним keypair'ом, поэтому оба
            # ключа берутся из одного ConfigMap. Разъедутся ключи — разнести.
            - name: AUTH_PUBLIC_KEY
              valueFrom:
                configMapKeyRef:
                  name: jwt-public-key
                  key: PUBLIC_KEY
            - name: CASEGO_PUBLIC_KEY
              valueFrom:
                configMapKeyRef:
                  name: jwt-public-key
                  key: PUBLIC_KEY
            - name: GIN_MODE
              value: release
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
