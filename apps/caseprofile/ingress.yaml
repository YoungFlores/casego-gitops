apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: caseprofile
  namespace: casego-apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - caseprofile.158-160-192-124.nip.io
      secretName: caseprofile-tls
  rules:
    - host: caseprofile.158-160-192-124.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: caseprofile
                port:
                  number: 8082
