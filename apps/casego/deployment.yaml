apiVersion: apps/v1
kind: Deployment
metadata:
  name: casego
  namespace: casego-apps
  labels:
    app: casego
spec:
  selector:
    matchLabels:
      app: casego
  template:
    metadata:
      labels:
        app: casego
    spec:
      containers:
        - name: casego
          image: ghcr.io/sewaustav/casego-casego:main-57-036430e2a03b2dd12a9f57858471fc301707b7e7 # {"$imagepolicy": "flux-system:casego-casego"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: POSTGRES_HOST
              value: postgres-casego
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: casego_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_CASEGO_PASSWORD
            - name: POSTGRES_DB
              value: casego_db
            - name: REDIS_HOST
              value: redis-casego
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: REDIS_PASSWORD
            - name: GRPC_SERVER
              value: caseprofile:50051
            - name: PAYMENT_GRPC_SERVER
              value: payment:50052
            - name: LEVEL_GRPC_SERVER
              value: profile:50053
            - name: GIN_MODE
              value: release
            - name: PUBLIC_KEY
              valueFrom:
                configMapKeyRef:
                  name: jwt-public-key
                  key: PUBLIC_KEY
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-private-key
                  key: PRIVATE_KEY
          envFrom:
            - secretRef:
                name: casego-llm
          volumeMounts:
            - name: payment-tls
              mountPath: /app/ca.crt
              subPath: ca.crt
              readOnly: true
            - name: payment-tls
              mountPath: /app/general-client.crt
              subPath: general-client.crt
              readOnly: true
            - name: payment-tls
              mountPath: /app/general-client.key
              subPath: general-client.key
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 384Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: payment-tls
          secret:
            secretName: payment-client-tls
