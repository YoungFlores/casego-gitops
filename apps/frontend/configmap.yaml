apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx
  namespace: casego-apps
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /api/v1/auth/ {
            proxy_pass http://auth:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/users/ {
            proxy_pass http://auth:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /profile/api/v1/ {
            proxy_pass http://profile:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/case_profile/ {
            rewrite ^/api/v1/case_profile/(.*)$ /api/v1/case_go/$1 break;
            proxy_pass http://caseprofile:8082;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/case_go/ {
            proxy_pass http://casego:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            try_files $uri =404;
        }

        location = /flutter_service_worker.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            try_files $uri =404;
        }

        location ~* \.(js|css|wasm|woff2?|ttf|otf|png|jpg|jpeg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   text/xml application/xml application/xml+rss text/javascript
                   application/wasm;
    }
