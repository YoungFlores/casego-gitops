apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile
  namespace: casego-apps
  labels:
    app: profile
spec:
  selector:
    matchLabels:
      app: profile
  template:
    metadata:
      labels:
        app: profile
    spec:
      initContainers:
        - name: copy-migrations
          image: ghcr.io/sewaustav/casego-profile:main-1781964751-36eff90217b1a445e2acfd5cc9f566913dfc17ca # {"$imagepolicy": "flux-system:casego-profile"}
          command: ["sh", "-c", "cp -r /root/migrations/. /m/"]
          volumeMounts:
            - name: migrations
              mountPath: /m
        - name: migrate
          image: migrate/migrate:v4.19.1
          args:
            - -path=/m
            - -database=postgres://dev_user:$(POSTGRES_PASSWORD)@postgres-profile:5432/app_db?sslmode=disable
            - up
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_PROFILE_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /m
      containers:
        - name: profile
          image: ghcr.io/sewaustav/casego-profile:main-1781964751-36eff90217b1a445e2acfd5cc9f566913dfc17ca # {"$imagepolicy": "flux-system:casego-profile"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50053
          env:
            - name: POSTGRES_HOST
              value: postgres-profile
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: dev_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_PROFILE_PASSWORD
            - name: POSTGRES_DB
              value: app_db
            - name: PUBLIC_KEY
              valueFrom:
                configMapKeyRef:
                  name: jwt-public-key
                  key: PUBLIC_KEY
            - name: GIN_MODE
              value: release
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: tls
              mountPath: /root/certs
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: profile-server-tls
        - name: migrations
          emptyDir: {}
