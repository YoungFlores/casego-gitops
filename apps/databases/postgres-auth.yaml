---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-auth-init
  namespace: casego-apps
data:
  init.sql: |
    CREATE TYPE user_role_enum AS ENUM ('USER', 'MODERATOR', 'ADMIN', 'SUPER_ADMIN');

    CREATE TABLE users (
        id SERIAL PRIMARY KEY,
        username VARCHAR(50) NOT NULL,
        email VARCHAR(100) NOT NULL,
        hashed_password VARCHAR(255),
        is_oauth BOOLEAN NOT NULL DEFAULT FALSE,
        role INTEGER NOT NULL DEFAULT 1,
        is_active BOOLEAN NOT NULL DEFAULT TRUE,
        is_verified BOOLEAN NOT NULL DEFAULT FALSE,
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        last_login_at TIMESTAMP WITH TIME ZONE,
        email_verified_at TIMESTAMP WITH TIME ZONE,
        deleted_at TIMESTAMP WITH TIME ZONE
    );
    CREATE UNIQUE INDEX ix_users_email ON users(email);
    CREATE UNIQUE INDEX ix_users_username ON users(username);

    CREATE TABLE refresh_tokens (
        id SERIAL PRIMARY KEY,
        user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        token_hash VARCHAR(128) NOT NULL,
        is_revoked BOOLEAN NOT NULL DEFAULT FALSE,
        expires_at TIMESTAMP WITH TIME ZONE NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        revoked_at TIMESTAMP WITH TIME ZONE,
        user_agent VARCHAR(255),
        ip_address VARCHAR(45)
    );
    CREATE INDEX idx_refresh_user_active ON refresh_tokens(user_id, is_revoked);
    CREATE INDEX ix_refresh_tokens_expires_at ON refresh_tokens(expires_at);
    CREATE UNIQUE INDEX ix_refresh_tokens_token_hash ON refresh_tokens(token_hash);
    CREATE INDEX ix_refresh_tokens_user_id ON refresh_tokens(user_id);

    CREATE TABLE user_roles (
        id SERIAL PRIMARY KEY,
        user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        role user_role_enum NOT NULL DEFAULT 'USER',
        granted_at TIMESTAMP NOT NULL DEFAULT NOW(),
        granted_by INTEGER REFERENCES users(id) ON DELETE SET NULL,
        CONSTRAINT uq_user_role_unique UNIQUE (user_id, role)
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-auth
  namespace: casego-apps
  labels:
    app: postgres-auth
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-auth
  template:
    metadata:
      labels:
        app: postgres-auth
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: auth_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_AUTH_PASSWORD
            - name: POSTGRES_DB
              value: auth_db
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "auth_user", "-d", "auth_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: postgres-auth-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-auth
  namespace: casego-apps
spec:
  selector:
    app: postgres-auth
  ports:
    - port: 5432
      targetPort: 5432
