---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-caseprofile-init
  namespace: casego-apps
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS case_profiles (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL UNIQUE,
        total_cases BIGINT DEFAULT 0,
        assertiveness DOUBLE PRECISION DEFAULT 0,
        empathy DOUBLE PRECISION DEFAULT 0,
        clarity_communication DOUBLE PRECISION DEFAULT 0,
        resistance DOUBLE PRECISION DEFAULT 0,
        eloquence DOUBLE PRECISION DEFAULT 0,
        initiative DOUBLE PRECISION DEFAULT 0,
        changed_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS case_profile_histories (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        assertiveness DOUBLE PRECISION DEFAULT 0,
        empathy DOUBLE PRECISION DEFAULT 0,
        clarity_communication DOUBLE PRECISION DEFAULT 0,
        resistance DOUBLE PRECISION DEFAULT 0,
        eloquence DOUBLE PRECISION DEFAULT 0,
        initiative DOUBLE PRECISION DEFAULT 0,
        actual_date TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS case_profile_results (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        case_id BIGINT NOT NULL,
        dialog_id BIGINT NOT NULL,
        steps_count INT DEFAULT 0,
        tokens_used INT DEFAULT 0,
        assertiveness DOUBLE PRECISION DEFAULT 0,
        empathy DOUBLE PRECISION DEFAULT 0,
        clarity_communication DOUBLE PRECISION DEFAULT 0,
        resistance DOUBLE PRECISION DEFAULT 0,
        eloquence DOUBLE PRECISION DEFAULT 0,
        initiative DOUBLE PRECISION DEFAULT 0,
        case_date TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS idx_case_profile_histories_user_id ON case_profile_histories(user_id);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-caseprofile
  namespace: casego-apps
  labels:
    app: postgres-caseprofile
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-caseprofile
  template:
    metadata:
      labels:
        app: postgres-caseprofile
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: caseprofile_user
            - name: POSTGRES_PASSWORD
              value: caseprofile_password
            - name: POSTGRES_DB
              value: caseprofile_db
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "caseprofile_user", "-d", "caseprofile_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: postgres-caseprofile-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-caseprofile
  namespace: casego-apps
spec:
  selector:
    app: postgres-caseprofile
  ports:
    - port: 5432
      targetPort: 5432
