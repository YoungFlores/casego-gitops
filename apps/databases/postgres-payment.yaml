---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-payment-init
  namespace: casego-apps
data:
  init.sql: |
    CREATE TABLE subscription_info (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        subscription INTEGER NOT NULL CHECK (subscription >= 0 AND subscription <= 2),
        first_payment_date TIMESTAMP WITH TIME ZONE,
        count_of_renewal INTEGER NOT NULL DEFAULT 0,
        is_auto_renew BOOL DEFAULT FALSE,
        last_payment_date TIMESTAMP WITH TIME ZONE,
        canceled_at TIMESTAMP WITH TIME ZONE,
        expired_at TIMESTAMP WITH TIME ZONE NOT NULL
    );

    CREATE TABLE payment_info (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        subscription_id BIGINT REFERENCES subscription_info(id) ON DELETE SET NULL,
        transaction_id VARCHAR(1000),
        price BIGINT NOT NULL,
        currency VARCHAR(3) DEFAULT 'RUB',
        status VARCHAR(50),
        payment_date TIMESTAMP WITH TIME ZONE NOT NULL
    );

    CREATE INDEX idx_subscription_user_id ON subscription_info (user_id);
    CREATE INDEX idx_payment_user_id_date ON payment_info (user_id, payment_date DESC);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-payment
  namespace: casego-apps
  labels:
    app: postgres-payment
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-payment
  template:
    metadata:
      labels:
        app: postgres-payment
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: payment_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_PAYMENT_PASSWORD
            - name: POSTGRES_DB
              value: payment_db
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "payment_user", "-d", "payment_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: postgres-payment-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-payment
  namespace: casego-apps
spec:
  selector:
    app: postgres-payment
  ports:
    - port: 5432
      targetPort: 5432
