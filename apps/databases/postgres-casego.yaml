---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-casego
  namespace: casego-apps
  labels:
    app: postgres-casego
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-casego
  template:
    metadata:
      labels:
        app: postgres-casego
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: casego_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_CASEGO_PASSWORD
            - name: POSTGRES_DB
              value: casego_db
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "casego_user", "-d", "casego_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-casego
  namespace: casego-apps
spec:
  selector:
    app: postgres-casego
  ports:
    - port: 5432
      targetPort: 5432
