---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-profile-init
  namespace: casego-apps
data:
  init.sql: |
    CREATE TABLE profiles (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL UNIQUE,
        avatar TEXT NOT NULL DEFAULT '',
        is_active BOOLEAN NOT NULL DEFAULT TRUE,
        description TEXT NOT NULL DEFAULT '',
        username VARCHAR(255) NOT NULL UNIQUE,
        name VARCHAR(255) NOT NULL,
        surname VARCHAR(255) NOT NULL,
        patronymic VARCHAR(255),
        city VARCHAR(255),
        age INTEGER,
        sex SMALLINT,
        profession VARCHAR(255),
        case_count INTEGER NOT NULL DEFAULT 0,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE user_social_links (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        type VARCHAR(100) NOT NULL,
        url TEXT NOT NULL,
        CONSTRAINT fk_user_profile FOREIGN KEY (user_id) REFERENCES profiles(user_id) ON DELETE CASCADE
    );

    CREATE TABLE user_purposes (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        purpose TEXT NOT NULL,
        CONSTRAINT fk_user_profile_purpose FOREIGN KEY (user_id) REFERENCES profiles(user_id) ON DELETE CASCADE
    );

    CREATE TABLE users_categories (
        user_id BIGINT NOT NULL,
        category_id SMALLINT NOT NULL,
        CONSTRAINT fk_user_profile_category FOREIGN KEY (user_id) REFERENCES profiles(user_id) ON DELETE CASCADE
    );

    CREATE TABLE categories (
        id SMALLSERIAL PRIMARY KEY,
        parent_id SMALLINT REFERENCES categories(id) ON DELETE CASCADE,
        name VARCHAR(255) NOT NULL
    );

    CREATE INDEX idx_profiles_user_id ON profiles(user_id);
    CREATE INDEX idx_social_links_user_id ON user_social_links(user_id);
    CREATE INDEX idx_purposes_user_id ON user_purposes(user_id);
    CREATE INDEX idx_users_categories_cat_id ON users_categories(category_id);
    CREATE INDEX idx_users_categories_user_id ON users_categories(user_id);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-profile
  namespace: casego-apps
  labels:
    app: postgres-profile
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-profile
  template:
    metadata:
      labels:
        app: postgres-profile
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: dev_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_PROFILE_PASSWORD
            - name: POSTGRES_DB
              value: app_db
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dev_user", "-d", "app_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: postgres-profile-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-profile
  namespace: casego-apps
spec:
  selector:
    app: postgres-profile
  ports:
    - port: 5432
      targetPort: 5432
