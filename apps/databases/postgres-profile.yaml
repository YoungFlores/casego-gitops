---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-profile
  namespace: casego-apps
  labels:
    app: postgres-profile
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-profile
  template:
    metadata:
      labels:
        app: postgres-profile
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: dev_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casego-db-credentials
                  key: POSTGRES_PROFILE_PASSWORD
            - name: POSTGRES_DB
              value: app_db
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dev_user", "-d", "app_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-profile-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-profile-data
  namespace: casego-apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-profile
  namespace: casego-apps
spec:
  selector:
    app: postgres-profile
  ports:
    - port: 5432
      targetPort: 5432
