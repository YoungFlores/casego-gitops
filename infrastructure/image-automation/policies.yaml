---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: casego-auth
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: casego-auth
  filterTags:
    pattern: '^main-(?P<run>\d+)-.+$'
    extract: '$run'
  policy:
    numerical:
      order: asc
