apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: metrics-server
      version: "3.13.0"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
      interval: 12h
  values:
    replicas: 1
    args:
      # Kubelet serving-сертификаты обычно self-signed (kubeadm / Terraform-кластер),
      # из-за чего metrics-server не может скрейпить kubelet (x509 ошибка).
      # Убрать этот флаг, если у kubelet валидные serving-сертификаты.
      - --kubelet-insecure-tls
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
